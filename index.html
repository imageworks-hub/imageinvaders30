<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>image Invaders</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="titleScreen">

    <img src="title.png" id="titleImage">

    <button id="startBtn"></button>

    <div id="shopBtn">

        アイテムショップ

    </div>

    <div id="accessCounter">
        ACCESS <span id="accessCount">------</span>
    </div>

</div>

<div id="stageSelectScreen">

    <button id="stageBackBtn">
        〈
    </button>

    <h2>STAGE SELECT</h2>

    <button class="stageBtn" id="stage1Btn">
        STAGE 1
    </button>

    <button class="stageBtn" id="stage2Btn">
        STAGE 2
    </button>

    <button class="stageBtn" id="stage3Btn">
        STAGE 3
    </button>

    <button class="stageBtn" id="stage4Btn">
        STAGE 4
    </button>

</div>

<div id="shopScreen">

<h2>アイテムショップ</h2>

<label>

<input
type="radio"
name="item"
checked>

被弾3回分ノーダメージ バリア（100円/1回）

</label>

<button id="buyBtn">

購入する

</button>

<button id="backBtn">

戻る

</button>

</div>

<canvas id="game"></canvas>

<div id="stage4CommentBox">

    <div id="stage4CommentLog"></div>

    <form id="stage4CommentForm">
        <input id="stage4CommentInput" type="text" maxlength="28" placeholder="STAGE 4 comment">
        <button id="stage4CommentSend" type="submit">SEND</button>
    </form>

</div>

<button id="saveBtn">カード保存</button>

<img id="cardImage"
style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:90%;
max-height:80%;
z-index:200;
">

<div id="saveMessage">
長押し保存
</div>

<script src="script.js"></script>

</body>
</html>
