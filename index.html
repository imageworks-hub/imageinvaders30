<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>imagegames</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="application-name" content="imagegames">
<meta name="apple-mobile-web-app-title" content="imagegames">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020514">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="titleScreen">

    <img src="title.png" id="titleImage" draggable="false">

    <button id="startBtn" type="button"><span>START</span></button>

    <button id="shopBtn" type="button" aria-label="&#12450;&#12452;&#12486;&#12512;&#12471;&#12519;&#12483;&#12503;">
        <img src="itemshop.png" id="itemShopImage" alt="ITEM SHOP">
    </button>


    <div id="cardCaseBtn">
        <img src="cardcase.png" id="cardCaseImage" alt="CARD CASE">
        <div id="cardCaseCount">0</div>
    </div>
    <div id="accessCounter">
        ACCESS <span id="accessCount">------</span>
    </div>

    <button id="titleSwipeHint" type="button" aria-label="NEXT GAME">
        <span>SWIPE</span>
        <span class="titleSwipeArrow">&#8594;</span>
    </button>

</div>

<div id="title2Screen" aria-hidden="true">

    <img src="title2.png" id="title2Image" alt="IMAGE CARD BATTLE" draggable="false">

    <button id="title2StartBtn" type="button" aria-label="IMAGE CARD BATTLE START">
        START
    </button>

    <div id="title2CardCaseBtn">
        <img src="cardcase.png" id="title2CardCaseImage" alt="CARD CASE">
        <div id="title2CardCaseCount">0</div>
    </div>

    <button id="title2BackBtn" type="button" aria-label="SWIPE BACK">
        <span class="title2BackArrow">&#8592;</span>
        <span>SWIPE BACK</span>
    </button>

</div>


<div id="cardCaseScreen">

    <button id="cardCaseClose">&#10005;</button>

    <h2>CARD CASE</h2>

    <div id="cardCaseTabs">
        <button class="cardCaseTab active" data-stage="1">STAGE 1</button>
        <button class="cardCaseTab" data-stage="2">STAGE 2</button>
        <button class="cardCaseTab" data-stage="3">STAGE 3</button>
        <button class="cardCaseTab" data-stage="4">STAGE 4</button>
        <button class="cardCaseTab" data-stage="5">STAGE 5</button>
    </div>

    <div id="cardCaseGrid"></div>

    <div id="cardDetailView">
        <div id="cardDetailPanel">
            <button id="cardDetailClose">&#10005;</button>
            <img id="cardDetailImage" src="" alt="">
            <div id="cardDetailStage"></div>
        </div>
    </div>

</div>
<div id="stageSelectScreen">

    <button id="stageBackBtn">&#12296;</button>

    <h2>STAGE SELECT</h2>

    <button class="stageBtn" id="stage1Btn">
        <span class="stageLabel">STAGE 1</span>
        <span class="stageDifficulty">&#11088;</span>
    </button>

    <button class="stageBtn" id="stage2Btn">
        <span class="stageLabel">STAGE 2</span>
        <span class="stageDifficulty">&#11088;&#11088;&#11088;</span>
    </button>

    <button class="stageBtn" id="stage3Btn">
        <span class="stageLabel">STAGE 3</span>
        <span class="stageDifficulty">&#11088;&#11088;&#11088;&#11088;</span>
    </button>

    <button class="stageBtn" id="stage4Btn">
        <span class="stageLabel">STAGE 4</span>
        <span class="stageDifficulty">&#11088;&#11088;</span>
    </button>

    <button class="stageBtn" id="stage5Btn">
        <span class="stageLabel">STAGE 5</span>
        <span class="stageDifficulty">&#11088;&#11088;&#11088;&#11088;&#11088;</span>
    </button>

</div>

<div id="shopScreen">

<h2>&#12450;&#12452;&#12486;&#12512;&#12471;&#12519;&#12483;&#12503;</h2>

<label>

<input
 type="radio"
 name="item"
 checked>

&#34987;&#24382;3&#22238;&#20998;&#12494;&#12540;&#12480;&#12513;&#12540;&#12472; &#12496;&#12522;&#12450;&#65288;100&#20870;/1&#22238;&#65289;

</label>

<button id="buyBtn">

&#36092;&#20837;&#12377;&#12427;

</button>

<button id="backBtn">

&#25147;&#12427;

</button>

</div>

<canvas id="game"></canvas>

<div id="damageFlashOverlay" aria-hidden="true"></div>

<div id="stage5Layer">
    <canvas id="stage5Canvas"></canvas>
    <div id="stage5Hud">
        <div>SCORE <span id="stage5Score">0</span></div>
        <div>BOSS <span id="stage5BossHp">100</span></div>
    </div>
    <div id="stage5Lives"></div>
    <div id="stage5Barrier"></div>
    <div id="stage5Reticle"></div>
    <div id="stage5EndMessage"></div>
</div>

<div id="stage4CommentBox">

    <div id="stage4CommentLog"></div>

    <form id="stage4CommentForm">
        <input id="stage4CommentInput" type="text" maxlength="28" placeholder="STAGE 4 comment">
        <button id="stage4CommentSend" type="submit">SEND</button>
    </form>

</div>

<button id="saveBtn">&#12459;&#12540;&#12489;&#20445;&#23384;</button>
<div id="clearRewardPanel">
    <img id="cardImage" src="" alt="">

    <div id="clearActions">
        <button id="clearRestartBtn" class="clearActionBtn" type="button">&#8635; RESTART</button>
        <button id="clearTitleBtn" class="clearActionBtn" type="button">&#8962; TITLE</button>
    </div>
</div>

<div id="saveMessage">
&#12479;&#12483;&#12503;&#12375;&#12390;&#20445;&#23384;
</div>

<script src="audio.js"></script>
<script src="script.js"></script>
<script type="module" src="stage5.js"></script>

</body>
</html>
